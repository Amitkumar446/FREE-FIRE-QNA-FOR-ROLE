<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FREE FIRE GUILD QNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-cyan: #00f0ff;
            --accent-orange: #ff6b00;
            --accent-green: #00ff88;
            --accent-red: #ff3366;
            --accent-yellow: #ffcc00;
            --accent-purple: #bf5fff;
            --text-primary: #ffffff;
            --text-secondary: #8892a0;
            --border-color: #2a2a3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 70px; /* Space for Bottom Nav */
        }

        .font-gaming { font-family: 'Orbitron', monospace; }

        /* Minimal Background */
        .bg-animated {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 70%);
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed; inset: 0;
            background: var(--bg-primary);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
        }
        .loading-screen.hidden { opacity: 0; visibility: hidden; }
        .loading-logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem; font-weight: 900;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .loading-bar { width: 200px; height: 3px; background: var(--bg-card); border-radius: 2px; margin-top: 20px; overflow: hidden; }
        .loading-progress { height: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-orange)); animation: loadProgress 1.5s ease-in-out forwards; }
        @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }

        /* Bottom Navigation (Mobile Style) */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: rgba(10, 10, 15, 0.98);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px 10px;
        }

        .nav-item.active { color: var(--accent-cyan); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 2px; }

        /* Main Container */
        .main-container { padding: 15px 10px; max-width: 600px; margin: 0 auto; }
        
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Compact Cards */
        .gaming-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }
        .gaming-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-orange));
        }

        .card-header {
            font-family: 'Orbitron', monospace;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center; gap: 10px;
        }
        .card-icon { display: none; } /* Hide icons to save space */

        /* Forms */
        .form-group { margin-bottom: 12px; }
        .form-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; display: block; }
        .form-input, .form-select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        .form-input:focus { outline: none; border-color: var(--accent-cyan); }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, var(--accent-cyan), #00b8cc); color: var(--bg-primary); }
        .btn-success { background: linear-gradient(135deg, var(--accent-green), #00cc6a); color: var(--bg-primary); }
        .btn-danger { background: linear-gradient(135deg, var(--accent-red), #cc2952); color: white; }
        .btn-purple { background: linear-gradient(135deg, var(--accent-purple), #9933ff); color: white; }
        .btn-secondary { background: linear-gradient(135deg, var(--accent-orange), #cc5500); color: white; }

        /* Timer */
        .timer-container {
            position: fixed;
            top: 10px; right: 10px;
            background: var(--bg-card);
            border: 1px solid var(--accent-cyan);
            border-radius: 20px;
            padding: 5px 15px;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .timer-value { font-family: 'Orbitron'; font-size: 1rem; color: var(--accent-cyan); }
        .timer-container.warning { border-color: var(--accent-red); }
        .timer-container.warning .timer-value { color: var(--accent-red); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Options */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option-btn {
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-align: left;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            font-size: 0.95rem;
        }
        .option-btn.selected { border: 2px solid var(--accent-cyan); background: rgba(0, 240, 255, 0.1); }
        .option-letter {
            width: 28px; height: 28px;
            background: var(--bg-card);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 0.8rem;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .option-btn.selected .option-letter { background: var(--accent-cyan); color: var(--bg-primary); }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--bg-card); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border-color); }
        .stat-value { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--accent-cyan); }
        .stat-label { font-size: 0.7rem; color: var(--text-secondary); }

        /* Admin Table -> Card View on Mobile */
        .admin-table { display: none; } /* Hide desktop table */
        .player-card-mobile {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }
        .player-card-mobile .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.85rem; }
        .player-card-mobile .actions { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .player-card-mobile .status { padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; }
        .status-selected { background: rgba(0, 255, 136, 0.2); color: var(--accent-green); }
        .status-pending { background: rgba(255, 204, 0, 0.2); color: var(--accent-yellow); }
        .status-rejected { background: rgba(255, 51, 102, 0.2); color: var(--accent-red); }

        /* Chat */
        .chat-container { height: 50vh; display: flex; flex-direction: column; background: var(--bg-secondary); border-radius: 8px; overflow: hidden; }
        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 0.9rem; }
        .message.received { background: var(--bg-card); align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.sent { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: var(--bg-primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-input-area { padding: 10px; background: var(--bg-card); display: flex; gap: 5px; }
        .chat-input { flex: 1; padding: 8px 12px; border-radius: 20px; background: var(--bg-secondary); border: 1px solid var(--border-color); color: white; }
        
        /* Results */
        .result-score { font-family: 'Orbitron'; font-size: 3rem; font-weight: 900; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 9998; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--accent-cyan); border-radius: 12px; padding: 20px; width: 90%; text-align: center; }

        /* Settings Card */
        .settings-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">FREE FIRE<br>GUILD QNA</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-section="home" onclick="navigate('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </div>
        <div class="nav-item" data-section="login" onclick="navigate('login')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            <span>Login</span>
        </div>
        <div class="nav-item" data-section="leaderboard" onclick="navigate('leaderboard')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/><circle cx="12" cy="8" r="7"/></svg>
            <span>Ranks</span>
        </div>
        <div class="nav-item" data-section="admin" onclick="navigate('admin')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>Admin</span>
        </div>
    </nav>

    <div class="main-container">
        <!-- HOME SECTION -->
        <div class="section active" id="homeSection">
            <div class="text-center mb-4 pt-2">
                <h1 class="font-gaming text-2xl font-black" style="color: var(--accent-cyan);">GUILD QNA</h1>
                <p style="color: var(--text-secondary); font-size: 0.8rem;">30 Questions | Pass 70%</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalPlayers">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="selectedPlayers">0</div>
                    <div class="stat-label">Selected</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgScore">0%</div>
                    <div class="stat-label">Avg</div>
                </div>
            </div>

            <div class="gaming-card" id="registrationCard">
                <div class="card-header">Register</div>
                <form id="registrationForm">
                    <div class="form-group">
                        <input type="text" class="form-input" id="playerName" placeholder="Player Name *" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-input" id="playerUID" placeholder="UID *" required>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="form-group">
                            <input type="number" class="form-input" id="playerLevel" placeholder="Lvl *" required>
                        </div>
                        <div class="form-group">
                            <select class="form-select" id="playerRank" required>
                                <option value="">Rank *</option>
                                <option value="Bronze">Bronze</option>
                                <option value="Silver">Silver</option>
                                <option value="Gold">Gold</option>
                                <option value="Diamond">Diamond</option>
                                <option value="Heroic">Heroic</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <select class="form-select" id="playerDevice" required>
                            <option value="">Device *</option>
                            <option value="Mobile">Mobile</option>
                            <option value="Emulator">Emulator</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select class="form-select" id="preferredRole">
                            <option value="">Preferred Role</option>
                            <option value="Rusher">Rusher</option>
                            <option value="Sniper">Sniper</option>
                            <option value="Support">Support</option>
                            <option value="Leader">Leader</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                         <div class="form-group">
                            <input type="password" class="form-input" id="regPassword" placeholder="Password *" required>
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-input" id="regConfirmPassword" placeholder="Confirm *" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Start Test</button>
                </form>
            </div>

            <div class="gaming-card" id="testCard" style="display: none;">
                <div style="margin-bottom: 15px;">
                    <div class="flex justify-between mb-1">
                        <span class="font-gaming" style="color: var(--accent-cyan); font-size: 0.8rem;" id="questionCounter">1/30</span>
                    </div>
                    <div class="progress-bar" style="height: 4px; background: var(--bg-secondary); border-radius: 2px; overflow: hidden;">
                        <div class="progress-fill" id="progressFill" style="width: 0%; height: 100%; background: var(--accent-cyan);"></div>
                    </div>
                </div>

                <p style="font-size: 1rem; font-weight: 600; margin-bottom: 15px;" id="questionText">Loading...</p>
                <div class="options-grid" id="optionsContainer"></div>

                <div class="flex justify-between gap-2 mt-4">
                    <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()" style="width: auto; padding: 10px 20px;">Prev</button>
                    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="flex: 1;">Next</button>
                    <button class="btn btn-success" id="submitBtn" onclick="submitTest()" style="display: none;">Submit</button>
                </div>
            </div>

            <div class="gaming-card" id="resultCard" style="display: none;">
                <div id="resultContent" class="text-center"></div>
            </div>
        </div>

        <!-- LOGIN SECTION -->
        <div class="section" id="loginSection">
            <div class="gaming-card">
                <div class="card-header">Player Login</div>
                <form id="loginForm">
                    <div class="form-group">
                        <input type="text" class="form-input" id="loginId" placeholder="Player ID (GUILD-XXXX)">
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-input" id="loginPassword" placeholder="Password">
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>
        </div>

        <!-- PLAYER DASHBOARD -->
        <div class="section" id="playerDashboard">
            <div class="gaming-card mb-2">
                <div class="flex justify-between items-center">
                    <div>
                        <span class="font-gaming" style="color: var(--accent-cyan);" id="dashboardPlayerId">GUILD-XXXX</span>
                        <span style="color: var(--text-secondary); font-size: 0.8rem; margin-left: 5px;">Stage: <span id="dashboardStage">1</span></span>
                    </div>
                    <button class="btn btn-danger" style="width: auto; padding: 5px 10px; font-size: 0.7rem;" onclick="playerLogout()">Logout</button>
                </div>
            </div>

            <div id="stage1Container" style="display: none;">
                <div class="gaming-card">
                    <div class="card-header">Set Password</div>
                    <form id="changePasswordForm">
                        <div class="form-group"><input type="password" class="form-input" id="newPass" placeholder="New Password"></div>
                        <div class="form-group"><input type="password" class="form-input" id="confirmPass" placeholder="Confirm"></div>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </form>
                </div>
            </div>

            <div id="stage2Container" style="display: none;">
                <div class="gaming-card mb-2">
                    <div class="card-header">Admin Chat</div>
                    <div class="chat-container">
                        <div class="chat-messages" id="playerChatMessages"></div>
                        <div class="chat-input-area">
                            <input type="text" class="chat-input" id="playerChatInput" placeholder="Type...">
                            <button class="btn btn-primary" style="width: auto; padding: 8px 15px;" onclick="sendPlayerMessage()">Send</button>
                        </div>
                    </div>
                </div>
                <div class="gaming-card">
                    <div class="card-header">Settings</div>
                    <div id="playerSettingsDisplay" style="font-size: 0.9rem;"></div>
                </div>
            </div>
        </div>

        <!-- LEADERBOARD -->
        <div class="section" id="leaderboardSection">
            <div class="gaming-card">
                <div class="card-header">Top 10</div>
                <div id="leaderboardContainer"></div>
            </div>
        </div>

        <!-- ADMIN -->
        <div class="section" id="adminSection">
            <div class="gaming-card" id="adminLoginCard">
                <div class="card-header">Admin</div>
                <form id="adminLoginForm">
                    <div class="form-group">
                        <input type="password" class="form-input" id="adminPassword" placeholder="Password">
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>

            <div id="adminDashboard" style="display: none;">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-gaming" style="color: var(--accent-cyan);">Panel</h2>
                    <button class="btn btn-danger" style="width: auto; padding: 5px 10px; font-size: 0.7rem;" onclick="adminLogout()">Logout</button>
                </div>
                
                <div class="gaming-card mb-2" id="newPlayerNotification" style="display: none; border-color: var(--accent-red);">
                    <span style="color: var(--accent-red); font-weight: bold;">New Players Ready!</span>
                </div>

                <div class="form-group">
                    <input type="text" class="form-input" id="searchUID" placeholder="Search UID..." oninput="searchPlayers()">
                </div>

                <div id="playersTableBody"></div>

                <div class="gaming-card" id="adminChatPanel" style="display: none;">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-gaming" style="font-size: 0.9rem;">Chat: <span id="chatPlayerName" style="color: var(--accent-cyan);"></span></span>
                        <button class="btn btn-secondary" style="width: auto; padding: 5px 10px; font-size: 0.7rem;" onclick="closeAdminChat()">Close</button>
                    </div>
                    <div class="chat-container">
                        <div class="chat-messages" id="adminChatMessages"></div>
                        <div class="chat-input-area">
                            <input type="text" class="chat-input" id="adminChatInput" placeholder="Reply...">
                            <button class="btn btn-success" style="width: auto; padding: 8px 15px;" onclick="sendAdminMessage()">Send</button>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button class="btn btn-purple" style="font-size: 0.7rem; padding: 8px;" onclick="sendSensi()">Sensi</button>
                        <button class="btn btn-purple" style="font-size: 0.7rem; padding: 8px;" onclick="sendHUD()">HUD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Timer -->
    <div class="timer-container" id="timerContainer" style="display: none;">
        <div class="timer-value" id="timerValue">15:00</div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="warningModal">
        <div class="modal-content">
            <h3 class="font-gaming" style="color: var(--accent-red); margin-bottom: 10px;">Alert</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem;" id="warningMessage"></p>
            <button class="btn btn-primary mt-4" onclick="closeModal('warningModal')">OK</button>
        </div>
    </div>

    <!-- Script (Same logic, just optimized for UI) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onValue, push, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpKcMSN4o2u_wEZUZ_LNDjw3TsMQNYG_A",
            authDomain: "esportsbyamit-yt.firebaseapp.com",
            databaseURL: "https://esportsbyamit-yt-default-rtdb.firebaseio.com",
            projectId: "esportsbyamit-yt",
            storageBucket: "esportsbyamit-yt.firebasestorage.app",
            messagingSenderId: "990449455307",
            appId: "1:990449455307:web:0f067283dc852756c54b4e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'players');

        const ADMIN_PASSWORD = "2642";
        const TOTAL_QUESTIONS = 30;
        const PASSING_SCORE = 70;
        
        let currentPlayer = null;
        let questions = [];
        let currentQuestionIndex = 0;
        let answers = {};
        let timeRemaining = 900;
        let timerInterval = null;
        let adminLoggedIn = false;
        let selectedChatPlayer = null;
        let allPlayersData = {};

        // Question Bank (Compressed representation - same logic)
        const rusherQuestions = [
            { q: "Enemy in building. Instinct?", options: ["Rush SMG", "Cover", "Team", "Wait"], correct: 0 },
            { q: "Best close SMG?", options: ["MP40", "UMP", "Vector", "P90"], correct: 0 },
            { q: "Teammate knocked hot zone?", options: ["Rush revive", "Clear", "Smoke", "Leave"], correct: 0 },
            { q: "Circle shrink, outside?", options: ["Run field", "Smoke rush", "Wait", "Vehicle"], correct: 3 },
            { q: "Ideal drop?", options: ["Hot drop", "Medium", "Safe", "Team"], correct: 0 },
            { q: "Best rush character?", options: ["Alok", "Chrono", "Jota", "Wukong"], correct: 2 },
            { q: "Shotgun range?", options: ["5-10m", "20-30m", "50m", "100m"], correct: 0 },
            { q: "Enemy behind Gloo?", options: ["Rush around", "Wait", "Nade", "Rotate"], correct: 0 },
            { q: "Best rush pet?", options: ["Panda", "Fox", "Robo", "Falco"], correct: 3 },
            { q: "Gun combo rusher?", options: ["MP40+M1014", "AWM+Kar", "M4+SCAR", "UMP+P90"], correct: 0 }
            // ... Add more if needed, logic is same
        ];

        const sniperQuestions = [
            { q: "Enemy 300m away?", options: ["Rush car", "High ground", "Ignore", "Team"], correct: 1 },
            { q: "Best sniper?", options: ["AWM", "Kar98k", "M82B", "SVD"], correct: 2 },
            { q: "Final zone position?", options: ["Center", "High ground", "Edge", "Building"], correct: 1 },
            { q: "Enemy behind cover?", options: ["Rush", "Wait peek", "Flank", "Nade"], correct: 1 },
            { q: "Best scope long?", options: ["Red Dot", "2x", "4x", "8x"], correct: 3 }
        ];

        const supportQuestions = [
            { q: "Team needs meds?", options: ["Share", "Keep", "Ammo only", "Meds only"], correct: 0 },
            { q: "Best support char?", options: ["Alok", "Chrono", "K", "All"], correct: 0 },
            { q: "Team knocked open?", options: ["Smoke revive", "Rush", "Cover", "Wait"], correct: 0 },
            { q: "Role in fight?", options: ["Backline", "Front", "Flank", "Observe"], correct: 0 },
            { q: "Support item?", options: ["Medkit", "Gloo", "Smoke", "All"], correct: 3 }
        ];

        const leaderQuestions = [
            { q: "Start ranked?", options: ["Coordinate", "Random", "Solo drop", "Others"], correct: 0 },
            { q: "Squad spread?", options: ["Regroup", "Solo", "Mark", "Wait"], correct: 0 },
            { q: "Final zone 3 squads?", options: ["Coordinate", "Rush random", "Third party", "Hide"], correct: 0 },
            { q: "Bad decisions mate?", options: ["Advice", "Ignore", "Rage", "Kick"], correct: 0 },
            { q: "Rotate time?", options: ["Early", "Late", "Never", "Random"], correct: 0 }
        ];

        const generalQuestions = [
            { q: "Max players classic?", options: ["50", "52", "100", "48"], correct: 0 },
            { q: "Aggressive char?", options: ["Jota", "Alok", "Wukong", "Chrono"], correct: 0 },
            { q: "Clash rounds win?", options: ["4", "3", "5", "6"], correct: 0 },
            { q: "Gloo strategy?", options: ["Strategic", "All at once", "Save", "Never"], correct: 0 },
            { q: "EP pet?", options: ["Waggor", "Panda", "Fox", "Robo"], correct: 0 }
        ];

        // Combine and duplicate to simulate large bank
        const questionsDB = [
            ...rusherQuestions, ...rusherQuestions, ...rusherQuestions, ...rusherQuestions, // Simulating 100+
            ...sniperQuestions, ...sniperQuestions, ...sniperQuestions, ...sniperQuestions,
            ...supportQuestions, ...supportQuestions, ...supportQuestions,
            ...leaderQuestions, ...leaderQuestions, ...leaderQuestions,
            ...generalQuestions, ...generalQuestions, ...generalQuestions
        ].map((item, idx) => ({...item, role: idx < 40 ? "Rusher" : idx < 80 ? "Sniper" : idx < 110 ? "Support" : idx < 140 ? "Leader" : "General"}));


        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 1500);
            
            document.getElementById('registrationForm').addEventListener('submit', handleRegistration);
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('adminLoginForm').addEventListener('submit', handleAdminLogin);
            
            listenForStats();
            listenForLeaderboard();
        });

        window.navigate = function(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active'));
            
            document.getElementById(section + 'Section').classList.add('active');
            document.querySelector(`[data-section="${section}"]`).classList.add('active');
        }

        function listenForStats() {
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                allPlayersData = data || {};
                const players = data ? Object.values(data) : [];
                
                document.getElementById('totalPlayers').textContent = players.length;
                document.getElementById('selectedPlayers').textContent = players.filter(p => p.status === 'selected').length;
                if (players.length > 0) {
                    const avg = Math.round(players.reduce((sum, p) => sum + (p.score || 0), 0) / players.length);
                    document.getElementById('avgScore').textContent = avg + '%';
                }
            });
        }

        function listenForLeaderboard() {
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                const players = data ? Object.values(data) : [];
                const sorted = players.sort((a, b) => (b.score || 0) - (a.score || 0)).slice(0, 10);
                renderLeaderboard(sorted);
            });
        }

        function renderLeaderboard(players) {
            const container = document.getElementById('leaderboardContainer');
            if (players.length === 0) { container.innerHTML = '<p style="text-align:center; padding:20px; color:var(--text-secondary);">Empty</p>'; return; }

            container.innerHTML = players.map((p, i) => `
                <div style="display: flex; align-items: center; padding: 8px; background: var(--bg-secondary); border-radius: 6px; margin-bottom: 5px;">
                    <div style="width: 25px; font-family: 'Orbitron'; font-size: 0.8rem; color: ${i < 3 ? 'var(--accent-green)' : 'inherit'};">${i+1}</div>
                    <div style="flex: 1; font-size: 0.9rem;">${p.name}</div>
                    <div class="font-gaming" style="font-size: 0.8rem; color: var(--accent-cyan);">${p.score}%</div>
                </div>
            `).join('');
        }

        async function handleRegistration(e) {
            e.preventDefault();
            
            const name = document.getElementById('playerName').value.trim();
            const uid = document.getElementById('playerUID').value.trim();
            const level = document.getElementById('playerLevel').value;
            const rank = document.getElementById('playerRank').value;
            const device = document.getElementById('playerDevice').value;
            const pass = document.getElementById('regPassword').value;
            const confPass = document.getElementById('regConfirmPassword').value;

            if (!name || !uid || !level || !rank || !device || !pass || pass !== confPass) {
                showWarning('Check fields/password');
                return;
            }

            currentPlayer = {
                id: 'GUILD-' + Math.random().toString(36).substr(2, 4).toUpperCase(),
                name, uid, level: parseInt(level), rank, device, preferredRole: document.getElementById('preferredRole').value,
                timestamp: new Date().toISOString(),
                score: 0, status: 'pending', stage: 0,
                password: pass, chat: [], sensi: null, hud: null,
                roleScores: { Rusher: 0, Sniper: 0, Support: 0, Leader: 0 }
            };

            initTest();
        }

        function showWarning(msg) {
            document.getElementById('warningMessage').textContent = msg;
            document.getElementById('warningModal').classList.add('show');
        }
        window.closeModal = function(id) { document.getElementById(id).classList.remove('show'); }

        function initTest() {
            document.getElementById('registrationCard').style.display = 'none';
            document.getElementById('testCard').style.display = 'block';
            document.getElementById('timerContainer').style.display = 'flex';

            const shuffledAll = shuffleArray([...questionsDB]);
            questions = shuffledAll.slice(0, TOTAL_QUESTIONS);
            questions = questions.map(q => ({
                ...q,
                shuffledOptions: shuffleArray(q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correct })))
            }));

            displayQuestion();
            startTimer();
        }

        function displayQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('questionCounter').textContent = `${currentQuestionIndex + 1}/${TOTAL_QUESTIONS}`;
            document.getElementById('progressFill').style.width = `${((currentQuestionIndex + 1) / TOTAL_QUESTIONS) * 100}%`;
            document.getElementById('questionText').textContent = q.q;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D'];

            q.shuffledOptions.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (answers[currentQuestionIndex] === idx ? ' selected' : '');
                btn.innerHTML = `<span class="option-letter">${letters[idx]}</span><span>${opt.text}</span>`;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });

            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            if (currentQuestionIndex === TOTAL_QUESTIONS - 1) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'block';
            } else {
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('submitBtn').style.display = 'none';
            }
        }

        window.selectOption = function(idx) { answers[currentQuestionIndex] = idx; displayQuestion(); }
        window.nextQuestion = function() { if (currentQuestionIndex < TOTAL_QUESTIONS - 1) { currentQuestionIndex++; displayQuestion(); } }
        window.prevQuestion = function() { if (currentQuestionIndex > 0) { currentQuestionIndex--; displayQuestion(); } }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 30) document.getElementById('timerContainer').classList.add('warning');
                if (timeRemaining <= 0) submitTest();
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('timerValue').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }

        async function submitTest() {
            clearInterval(timerInterval);
            document.getElementById('timerContainer').style.display = 'none';

            let correct = 0;
            const roleScores = { Rusher: 0, Sniper: 0, Support: 0, Leader: 0, General: 0 };
            const roleCounts = { Rusher: 0, Sniper: 0, Support: 0, Leader: 0, General: 0 };

            questions.forEach((q, idx) => {
                const userAns = answers[idx];
                const correctIdx = q.shuffledOptions.findIndex(o => o.isCorrect);
                if (roleCounts[q.role] !== undefined) roleCounts[q.role]++;
                if (userAns === correctIdx) { correct++; if (roleScores[q.role] !== undefined) roleScores[q.role]++; }
            });

            const percentage = Math.round((correct / TOTAL_QUESTIONS) * 100);
            let status = percentage >= PASSING_SCORE ? 'selected' : percentage >= 50 ? 'average' : 'rejected';
            
            let maxRole = 0, suggestedRole = 'All-Rounder';
            Object.entries(roleScores).forEach(([r, s]) => {
                if (r === 'General') return;
                const pct = roleCounts[r] > 0 ? s / roleCounts[r] : 0;
                if (pct > maxRole) { maxRole = pct; suggestedRole = r; }
            });

            const stage = percentage >= PASSING_SCORE ? 2 : 0;

            currentPlayer.score = percentage;
            currentPlayer.status = status;
            currentPlayer.suggestedRole = suggestedRole;
            currentPlayer.roleScores = roleScores;
            currentPlayer.stage = stage;

            await set(ref(db, 'players/' + currentPlayer.id), currentPlayer);
            displayResults({ percentage, correct, total: TOTAL_QUESTIONS, status, suggestedRole });
        }

        function displayResults(r) {
            document.getElementById('testCard').style.display = 'none';
            document.getElementById('resultCard').style.display = 'block';
            const content = document.getElementById('resultContent');
            
            if (r.status === 'selected') {
                content.innerHTML = `
                    <h2 style="color: var(--accent-green); margin-bottom: 10px;">PASSED</h2>
                    <div class="result-score">${r.percentage}%</div>
                    <p style="margin: 10px 0;">Role: ${r.suggestedRole}</p>
                    <div class="gaming-card text-left" style="border-color: var(--accent-green);">
                        <p style="font-size: 0.8rem;">ID: <span style="color: var(--accent-cyan);">${currentPlayer.id}</span></p>
                        <p style="font-size: 0.8rem;">Pass: <span style="color: var(--accent-cyan);">${currentPlayer.password}</span></p>
                    </div>
                    <button class="btn btn-success mt-4" onclick="navigate('login'); resetTestUI();">Go to Login</button>
                `;
            } else {
                content.innerHTML = `
                    <h2 style="color: var(--accent-red); margin-bottom: 10px;">${r.status === 'average' ? 'ALMOST' : 'FAILED'}</h2>
                    <div class="result-score">${r.percentage}%</div>
                    <p style="margin: 10px 0;">Role: ${r.suggestedRole}</p>
                    <button class="btn btn-secondary mt-4" onclick="resetTestUI()">Home</button>
                `;
            }
        }

        window.resetTestUI = function() {
            currentPlayer = null; questions = []; currentQuestionIndex = 0; answers = {}; timeRemaining = 900;
            document.getElementById('registrationCard').style.display = 'block';
            document.getElementById('testCard').style.display = 'none';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('registrationForm').reset();
            navigate('home');
        }

        // Login & Dashboard Logic (Same as before, just functional)
        async function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('loginId').value.trim().toUpperCase();
            const pass = document.getElementById('loginPassword').value;
            const snapshot = await get(child(ref(db), `players/${id}`));
            if (!snapshot.exists() || snapshot.val().password !== pass) { showWarning('Invalid'); return; }
            if (snapshot.val().status !== 'selected') { showWarning('Not selected'); return; }
            currentPlayer = snapshot.val();
            showPlayerDashboard();
        }

        function showPlayerDashboard() {
            navigate('playerDashboard');
            document.getElementById('dashboardPlayerId').textContent = currentPlayer.id;
            if (currentPlayer.stage >= 2) {
                document.getElementById('stage1Container').style.display = 'none';
                document.getElementById('stage2Container').style.display = 'block';
                listenToPlayerChat();
                listenToPlayerSettings();
            } else { document.getElementById('stage1Container').style.display = 'block'; document.getElementById('stage2Container').style.display = 'none'; }
        }

        function listenToPlayerChat() {
            const chatRef = ref(db, `players/${currentPlayer.id}/chat`);
            onValue(chatRef, (snapshot) => {
                const chat = snapshot.val();
                const container = document.getElementById('playerChatMessages');
                if (!chat) { container.innerHTML = '<div class="message received">Admin chat</div>'; return; }
                container.innerHTML = Object.values(chat).map(m => `<div class="message ${m.from === 'player' ? 'sent' : 'received'}">${m.text}</div>`).join('');
                container.scrollTop = container.scrollHeight;
            });
        }

        function listenToPlayerSettings() {
            onValue(ref(db, `players/${currentPlayer.id}`), (snapshot) => {
                const p = snapshot.val();
                const c = document.getElementById('playerSettingsDisplay');
                c.innerHTML = p.sensi ? `<div class="settings-item"><span>Gen</span><span>${p.sensi.general}</span></div><div class="settings-item"><span>RedDot</span><span>${p.sensi.redDot}</span></div>` : 'Wait for admin.';
            });
        }

        window.sendPlayerMessage = async function() {
            const input = document.getElementById('playerChatInput');
            if (!input.value.trim()) return;
            await push(ref(db, `players/${currentPlayer.id}/chat`), { from: 'player', text: input.value.trim(), time: Date.now() });
            input.value = '';
        }
        
        window.playerLogout = function() { currentPlayer = null; navigate('home'); }

        // Admin Logic
        function handleAdminLogin(e) {
            e.preventDefault();
            if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                adminLoggedIn = true;
                document.getElementById('adminLoginCard').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                listenToPlayersTable();
            } else showWarning('Wrong pass');
        }

        function listenToPlayersTable() {
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                allPlayersData = data || {};
                renderPlayersMobile(Object.values(allPlayersData));
            });
        }

        // Render as Cards for Mobile
        function renderPlayersMobile(players) {
            const container = document.getElementById('playersTableBody');
            if (players.length === 0) { container.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">Empty</p>'; return; }
            
            container.innerHTML = players.map(p => `
                <div class="player-card-mobile">
                    <div class="row">
                        <span class="font-gaming" style="color:var(--accent-cyan);">${p.id}</span>
                        <span class="status status-${p.status}">${p.status}</span>
                    </div>
                    <div class="row">
                        <span>${p.name}</span>
                        <span>${p.score}%</span>
                    </div>
                    <div class="row">
                        <span style="color:var(--text-secondary);">UID: ${p.uid}</span>
                        <span style="color:var(--accent-purple);">${p.suggestedRole || '-'}</span>
                    </div>
                    <div class="actions">
                        ${p.status === 'pending' ? 
                            `<button class="btn btn-success" style="padding: 5px;" onclick="approvePlayer('${p.id}')">Approve</button>
                             <button class="btn btn-danger" style="padding: 5px;" onclick="rejectPlayer('${p.id}')">Reject</button>` : 
                             `<button class="btn btn-purple" style="padding: 5px; grid-column: span 2;" onclick="openAdminChat('${p.id}')">Chat</button>`
                        }
                    </div>
                </div>
            `).join('');
        }

        window.searchPlayers = function() {
            const q = document.getElementById('searchUID').value.toLowerCase();
            const filtered = Object.values(allPlayersData).filter(p => p.uid.includes(q) || p.name.toLowerCase().includes(q));
            renderPlayersMobile(filtered);
        }

        window.approvePlayer = async function(id) { await update(ref(db, 'players/' + id), { status: 'selected', stage: 2 }); }
        window.rejectPlayer = async function(id) { await update(ref(db, 'players/' + id), { status: 'rejected', stage: 0 }); }

        window.openAdminChat = function(id) {
            selectedChatPlayer = allPlayersData[id];
            document.getElementById('adminChatPanel').style.display = 'block';
            document.getElementById('chatPlayerName').textContent = selectedChatPlayer.name;
            onValue(ref(db, `players/${id}/chat`), (snap) => {
                const chat = snap.val();
                const c = document.getElementById('adminChatMessages');
                if(!chat) { c.innerHTML = ''; return; }
                c.innerHTML = Object.values(chat).map(m => `<div class="message ${m.from === 'admin' ? 'sent' : 'received'}">${m.text}</div>`).join('');
                c.scrollTop = c.scrollHeight;
            });
        }
        window.closeAdminChat = function() { document.getElementById('adminChatPanel').style.display = 'none'; }
        window.sendAdminMessage = async function() {
            const input = document.getElementById('adminChatInput');
            if(!input.value.trim()) return;
            await push(ref(db, `players/${selectedChatPlayer.id}/chat`), { from: 'admin', text: input.value.trim(), time: Date.now() });
            input.value = '';
        }
        window.sendSensi = async function() {
            const s = { general: 85, redDot: 75, scope2x: 60, scope4x: 45, sniper: 30 };
            await push(ref(db, `players/${selectedChatPlayer.id}/chat`), { from: 'admin', text: `Sensi: Gen ${s.general} | Red ${s.redDot}`, time: Date.now() });
            await update(ref(db, 'players/' + selectedChatPlayer.id), { sensi: s });
        }
        window.sendHUD = async function() {
            await push(ref(db, `players/${selectedChatPlayer.id}/chat`), { from: 'admin', text: 'HUD: Fire BR, Joystick TL', time: Date.now() });
        }
        window.adminLogout = function() { adminLoggedIn = false; document.getElementById('adminLoginCard').style.display = 'block'; document.getElementById('adminDashboard').style.display = 'none'; }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
    </script>
</body>
</html>
