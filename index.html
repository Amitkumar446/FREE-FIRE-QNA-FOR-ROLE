<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FREE FIRE GUILD QNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-cyan: #00f0ff;
            --accent-orange: #ff6b00;
            --accent-green: #00ff88;
            --accent-red: #ff3366;
            --accent-yellow: #ffcc00;
            --accent-purple: #bf5fff;
            --text-primary: #ffffff;
            --text-secondary: #8892a0;
            --border-color: #2a2a3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 70px;
        }

        .font-gaming { font-family: 'Orbitron', monospace; }
        .bg-animated { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 70%); }

        /* Loading */
        .loading-screen { position: fixed; inset: 0; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.3s ease; }
        .loading-screen.hidden { opacity: 0; visibility: hidden; }
        .loading-logo { font-family: 'Orbitron'; font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .loading-bar { width: 200px; height: 3px; background: var(--bg-card); border-radius: 2px; margin-top: 20px; overflow: hidden; }
        .loading-progress { height: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-orange)); animation: loadProgress 1.5s ease-in-out forwards; }
        @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: rgba(10, 10, 15, 0.98); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-secondary); font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.2s; padding: 5px 10px; }
        .nav-item.active { color: var(--accent-cyan); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 2px; }

        /* Main */
        .main-container { padding: 15px 10px; max-width: 600px; margin: 0 auto; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards */
        .gaming-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; }
        .gaming-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-orange)); }
        .card-header { font-family: 'Orbitron', monospace; font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        /* Forms */
        .form-group { margin-bottom: 12px; }
        .form-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; display: block; }
        .form-input, .form-select { width: 100%; padding: 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; }
        .form-input:focus { outline: none; border-color: var(--accent-cyan); }

        /* Buttons */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, var(--accent-cyan), #00b8cc); color: var(--bg-primary); }
        .btn-success { background: linear-gradient(135deg, var(--accent-green), #00cc6a); color: var(--bg-primary); }
        .btn-danger { background: linear-gradient(135deg, var(--accent-red), #cc2952); color: white; }
        .btn-purple { background: linear-gradient(135deg, var(--accent-purple), #9933ff); color: white; }
        .btn-secondary { background: linear-gradient(135deg, var(--accent-orange), #cc5500); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); }

        /* Timer */
        .timer-container { position: fixed; top: 10px; right: 10px; background: var(--bg-card); border: 1px solid var(--accent-cyan); border-radius: 20px; padding: 5px 15px; z-index: 999; display: flex; align-items: center; gap: 5px; }
        .timer-value { font-family: 'Orbitron'; font-size: 1rem; color: var(--accent-cyan); }
        .timer-container.warning { border-color: var(--accent-red); }
        .timer-container.warning .timer-value { color: var(--accent-red); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Options */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option-btn { padding: 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 8px; text-align: left; color: var(--text-primary); display: flex; align-items: center; font-size: 0.95rem; }
        .option-btn.selected { border: 2px solid var(--accent-cyan); background: rgba(0, 240, 255, 0.1); }
        .option-letter { width: 28px; height: 28px; background: var(--bg-card); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 0.8rem; margin-right: 10px; flex-shrink: 0; }
        .option-btn.selected .option-letter { background: var(--accent-cyan); color: var(--bg-primary); }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--bg-card); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border-color); }
        .stat-value { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--accent-cyan); }
        .stat-label { font-size: 0.7rem; color: var(--text-secondary); }

        /* Admin Card View */
        .player-card-mobile { background: var(--bg-secondary); border-radius: 8px; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .player-card-mobile .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.85rem; }
        .player-card-mobile .actions { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .status { padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; }
        .status-selected { background: rgba(0, 255, 136, 0.2); color: var(--accent-green); }
        .status-pending { background: rgba(255, 204, 0, 0.2); color: var(--accent-yellow); }
        .status-rejected { background: rgba(255, 51, 102, 0.2); color: var(--accent-red); }

        /* Chat */
        .chat-container { height: 50vh; display: flex; flex-direction: column; background: var(--bg-secondary); border-radius: 8px; overflow: hidden; }
        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 0.9rem; }
        .message.received { background: var(--bg-card); align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.sent { background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); color: var(--bg-primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-input-area { padding: 10px; background: var(--bg-card); display: flex; gap: 5px; }
        .chat-input { flex: 1; padding: 8px 12px; border-radius: 20px; background: var(--bg-secondary); border: 1px solid var(--border-color); color: white; }
        
        /* Results */
        .result-score { font-family: 'Orbitron'; font-size: 3rem; font-weight: 900; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 9998; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--accent-cyan); border-radius: 12px; padding: 20px; width: 95%; max-width: 500px; text-align: center; max-height: 90vh; overflow-y: auto; }

        /* Answer Review Styles */
        .review-item { text-align: left; background: var(--bg-secondary); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; }
        .review-correct { border-left: 3px solid var(--accent-green); }
        .review-wrong { border-left: 3px solid var(--accent-red); }
        .review-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: var(--bg-card); margin-left: 5px; }
    </style>
</head>

            };

            const distances = ["10m", "25m", "50m", "100m", "150m", "200m", "300m"];
            const scopes = ["Red Dot", "2x Scope", "4x Scope", "6x Scope", "8x Scope"];
            const throwables = ["Gloo Wall", "Frag Grenade", "Smoke Grenade", "Flashbang"];
            const locations = ["Pochinki", "Peak", "Factory", "Clock Tower", "Ship", "Hangar", "Bimasakti"];

            // --- RUSHER GENERATOR ---
            const rusherSituations = [
                `Enemy spotted at {dist}. Weapon?`, 
                `You have {wep}. Push or Wait?`, 
                `Teammate knocked at {loc}. Action?`,
                `Low HP ({hp}). Continue fight?`,
                `Enemy using {wep}. Counter strat?`
            ];

            for(let i=0; i<200; i++) {
                const qTemplate = rusherSituations[i % rusherSituations.length];
                let qText = qTemplate
                    .replace('{dist}', distances[Math.floor(Math.random() * distances.length)])
                    .replace('{wep}', weapons.smg[Math.floor(Math.random() * weapons.smg.length)])
                    .replace('{loc}', locations[Math.floor(Math.random() * locations.length)])
                    .replace('{hp}', Math.floor(Math.random() * 40 + 10));
                
                bank.push({
                    q: `[Rusher] ${qText}`,
                    options: shuffleArray(["Rush", "Gloo & Heal", "Flank", "Retreat"]),
                    correct: Math.floor(Math.random() * 4),
                    role: "Rusher"
                });
            }
            // Add static rusher logic
            bank.push({ q: "M1887 best range?", options: ["5m", "20m", "50m", "100m"], correct: 0, role: "Rusher" });
            bank.push({ q: "Best pet for rush?", options: ["Falco", "Panda", "Robo", "Spirit Fox"], correct: 0, role: "Rusher" });


            // --- SNIPER GENERATOR ---
            const sniperSituations = [
                `Target moving at {dist}. Lead shot?`,
                `Scope {scope} for target at {dist}?`,
                `Enemy sniper at {loc}. Counter?`,
                `Using {wep}. Headshot chance?`,
                `Target behind Gloo. Break it?`
            ];

            for(let i=0; i<200; i++) {
                const qTemplate = sniperSituations[i % sniperSituations.length];
                let qText = qTemplate
                    .replace('{dist}', distances[Math.floor(Math.random() * distances.length)])
                    .replace('{scope}', scopes[Math.floor(Math.random() * scopes.length)])
                    .replace('{loc}', locations[Math.floor(Math.random() * locations.length)])
                    .replace('{wep}', weapons.sniper[Math.floor(Math.random() * weapons.sniper.length)]);

                bank.push({
                    q: `[Sniper] ${qText}`,
                    options: shuffleArray(["Yes", "No", "Maybe", "Wait"]),
                    correct: Math.floor(Math.random() * 4),
                    role: "Sniper"
                });
            }
            bank.push({ q: "AWM ammo?", options: [".300 Mag", "7.62mm", "5.56mm", "9mm"], correct: 0, role: "Sniper" });


            // --- SUPPORT GENERATOR ---
            const supportSituations = [
                `Team needs {item}. Priority?`,
                `Revive teammate under fire?`,
                `Squad HP average {hp}. Action?`,
                `Low on ammo. Share?`,
                `Zone far away. Vehicle?`
            ];

            for(let i=0; i<200; i++) {
                const qTemplate = supportSituations[i % supportSituations.length];
                let qText = qTemplate
                    .replace('{item}', throwables[Math.floor(Math.random() * throwables.length)])
                    .replace('{hp}', Math.floor(Math.random() * 50 + 20));

                bank.push({
                    q: `[Support] ${qText}`,
                    options: shuffleArray(["Yes", "No", "Prioritize", "Ask Leader"]),
                    correct: Math.floor(Math.random() * 4),
                    role: "Support"
                });
            }

            // --- LEADER GENERATOR ---
            const leaderSituations = [
                `Drop at {loc}?`, 
                `Zone shrink in {t}s. Rotate?`, 
                `Squad member offline. Action?`,
                `Enemy squad spotted. Call?`,
                `Final zone strategy?`
            ];

            for(let i=0; i<200; i++) {
                const qTemplate = leaderSituations[i % leaderSituations.length];
                let qText = qTemplate
                    .replace('{loc}', locations[Math.floor(Math.random() * locations.length)])
                    .replace('{t}', Math.floor(Math.random() * 60 + 30));

                bank.push({
                    q: `[Leader] ${qText}`,
                    options: shuffleArray(["Go", "Wait", "Flank", "Camp"]),
                    correct: Math.floor(Math.random() * 4),
                    role: "Leader"
                });
            }

            // --- GENERAL KNOWLEDGE GENERATOR ---
            const generalFacts = [
                `Max ammo for {wep}?`, `Reload time for {wep}?`, `Best attachment for {wep}?`
            ];

            for(let i=0; i<200; i++) {
                const qTemplate = generalFacts[i % generalFacts.length];
                const allWeps = [...weapons.ar, ...weapons.smg];
                let qText = qTemplate.replace('{wep}', allWeps[Math.floor(Math.random() * allWeps.length)]);

                bank.push({
                    q: `[General] ${qText}`,
                    options: shuffleArray(["High", "Medium", "Low", "Variable"]),
                    correct: Math.floor(Math.random() * 4),
                    role: "General"
                });
            }

            return shuffleArray(bank); // Shuffle the whole bank
        };

        // Initialize Questions immediately
        const questionsDB = generateQuestionBank(); 
        console.log("Total Questions Generated:", questionsDB.length);


        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 1500);
            
            document.getElementById('registrationForm').addEventListener('submit', handleRegistration);
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('adminLoginForm').addEventListener('submit', handleAdminLogin);
            
            listenForStats();
            listenForLeaderboard();
        });

        window.navigate = function(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active'));
            document.getElementById(section + 'Section').classList.add('active');
            document.querySelector(`[data-section="${section}"]`).classList.add('active');
        }

        function listenForStats() {
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                allPlayersData = data || {};
                const players = data ? Object.values(data) : [];
                document.getElementById('totalPlayers').textContent = players.length;
                document.getElementById('selectedPlayers').textContent = players.filter(p => p.status === 'selected').length;
                if (players.length > 0) {
                    const avg = Math.round(players.reduce((sum, p) => sum + (p.score || 0), 0) / players.length);
                    document.getElementById('avgScore').textContent = avg + '%';
                }
            });
        }

        function listenForLeaderboard() {
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                const players = data ? Object.values(data) : [];
                const sorted = players.sort((a, b) => (b.score || 0) - (a.score || 0)).slice(0, 10);
                renderLeaderboard(sorted);
            });
        }

        function renderLeaderboard(players) {
            const container = document.getElementById('leaderboardContainer');
            if (players.length === 0) { container.innerHTML = '<p style="text-align:center; padding:20px; color:var(--text-secondary);">Empty</p>'; return; }
            container.innerHTML = players.map((p, i) => `
                <div style="display: flex; align-items: center; padding: 8px; background: var(--bg-secondary); border-radius: 6px; margin-bottom: 5px;">
                    <div style="width: 25px; font-family: 'Orbitron'; font-size: 0.8rem; color: ${i < 3 ? 'var(--accent-green)' : 'inherit'};">${i+1}</div>
                    <div style="flex: 1; font-size: 0.9rem;">${p.name}</div>
                    <div class="font-gaming" style="font-size: 0.8rem; color: var(--accent-cyan);">${p.score}%</div>
                </div>
            `).join('');
        }

        async function handleRegistration(e) {
            e.preventDefault();
            const name = document.getElementById('playerName').value.trim();
            const uid = document.getElementById('playerUID').value.trim();
            const level = document.getElementById('playerLevel').value;
            const rank = document.getElementById('playerRank').value;
            const device = document.getElementById('playerDevice').value;
            const pass = document.getElementById('regPassword').value;
            const confPass = document.getElementById('regConfirmPassword').value;

            if (!name || !uid || !level || !rank || !device || !pass || pass !== confPass) {
                showWarning('Check fields/password');
                return;
            }

            // Check if UID exists
            const uidQuery = query(dbRef, orderByChild('uid'), equalTo(uid));
            const snapshot = await get(uidQuery);
            if (snapshot.exists()) {
                showWarning('UID already registered');
                return;
            }

            currentPlayer = {
                uid: uid, // UID is now the main key conceptually
                name, level: parseInt(level), rank, device, 
                timestamp: new Date().toISOString(),
                score: 0, status: 'pending', stage: 0,
                password: pass, chat: [], sensi: null, hud: null,
                roleScores: { Rusher: 0, Sniper: 0, Support: 0, Leader: 0 }
            };

            initTest();
        }

        function showWarning(msg) {
            document.getElementById('warningMessage').textContent = msg;
            document.getElementById('warningModal').classList.add('show');
        }
        window.closeModal = function(id) { document.getElementById(id).classList.remove('show'); }

        function initTest() {
            document.getElementById('registrationCard').style.display = 'none';
            document.getElementById('testCard').style.display = 'block';
            document.getElementById('timerContainer').style.display = 'flex';

            // Pick 30 from the massive bank
            questions = shuffleArray([...questionsDB]).slice(0, TOTAL_QUESTIONS);
            questions = questions.map(q => ({
                ...q,
                shuffledOptions: shuffleArray(q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correct })))
            }));

            displayQuestion();
            startTimer();
        }

        function displayQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('questionCounter').textContent = `${currentQuestionIndex + 1}/${TOTAL_QUESTIONS}`;
            document.getElementById('progressFill').style.width = `${((currentQuestionIndex + 1) / TOTAL_QUESTIONS) * 100}%`;
            
            // Extract Role tag
            const roleTag = `<span class="review-tag">${q.role}</span>`;
            document.getElementById('questionText').innerHTML = `${q.q.replace(`[${q.role}] `, '')} ${roleTag}`;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D'];

            q.shuffledOptions.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (answers[currentQuestionIndex] === idx ? ' selected' : '');
                btn.innerHTML = `<span class="option-letter">${letters[idx]}</span><span>${opt.text}</span>`;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });

            document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
            if (currentQuestionIndex === TOTAL_QUESTIONS - 1) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'block';
            } else {
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('submitBtn').style.display = 'none';
            }
        }

        window.selectOption = function(idx) { answers[currentQuestionIndex] = idx; displayQuestion(); }
        window.nextQuestion = function() { if (currentQuestionIndex < TOTAL_QUESTIONS - 1) { currentQuestionIndex++; displayQuestion(); } }
        window.prevQuestion = function() { if (currentQuestionIndex > 0) { currentQuestionIndex--; displayQuestion(); } }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 30) document.getElementById('timerContainer').classList.add('warning');
                if (timeRemaining <= 0) submitTest();
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            document.getElementById('timerValue').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }

        async function submitTest() {
            clearInterval(timerInterval);
            document.getElementById('timerContainer').style.display = 'none';

            let correct = 0;
            const roleScores = { Rusher: 0, Sniper: 0, Support: 0, Leader: 0, General: 0 };
            const roleCounts = { Rusher: 0, Sniper: 0, Support: 0, Leader: 0, General: 0 };

            questions.forEach((q, idx) => {
                const userAns = answers[idx];
                const correctIdx = q.shuffledOptions.findIndex(o => o.isCorrect);
                if (roleCounts[q.role] !== undefined) roleCounts[q.role]++;
                if (userAns === correctIdx) { correct++; if (roleScores[q.role] !== undefined) roleScores[q.role]++; }
            });

            const percentage = Math.round((correct / TOTAL_QUESTIONS) * 100);
            let status = percentage >= PASSING_SCORE ? 'selected' : percentage >= 50 ? 'average' : 'rejected';
            
            let maxRole = 0, suggestedRole = 'All-Rounder';
            Object.entries(roleScores).forEach(([r, s]) => {
                if (r === 'General') return;
                const pct = roleCounts[r] > 0 ? s / roleCounts[r] : 0;
                if (pct > maxRole) { maxRole = pct; suggestedRole = r; }
            });

            const stage = percentage >= PASSING_SCORE ? 2 : 0;

            currentPlayer.score = percentage;
            currentPlayer.status = status;
            currentPlayer.suggestedRole = suggestedRole;
            currentPlayer.roleScores = roleScores;
            currentPlayer.stage = stage;

            // Save with UID as key (or push key if preferred, but UID query works)
            // Ideally: ref(db, 'players/' + currentPlayer.uid)
            // But to keep it safe with existing query logic, we'll use push key but store uid field
            const newPlayerRef = push(dbRef); 
            await set(newPlayerRef, currentPlayer);

            displayResults({ percentage, correct, total: TOTAL_QUESTIONS, status, suggestedRole });
        }

        function displayResults(r) {
            document.getElementById('testCard').style.display = 'none';
            document.getElementById('resultCard').style.display = 'block';
            const content = document.getElementById('resultContent');
            
            content.innerHTML = `
                <h2 style="color: ${r.status === 'selected' ? 'var(--accent-green)' : r.status === 'average' ? 'var(--accent-yellow)' : 'var(--accent-red)'}; margin-bottom: 10px;">${r.status.toUpperCase()}</h2>
                <div class="result-score">${r.percentage}%</div>
                <p style="margin: 10px 0; font-size: 0.9rem;">Role: <strong>${r.suggestedRole}</strong></p>
                
                <button class="btn btn-outline mb-4" onclick="showReviewModal()">Review Answers</button>
                
                ${r.status === 'selected' ? `
                    <div class="gaming-card text-left" style="border-color: var(--accent-green);">
                        <p style="font-size: 0.85rem;">Login ID: <span style="color: var(--accent-cyan);">${currentPlayer.uid}</span></p>
                        <p style="font-size: 0.85rem;">Password: <span style="color: var(--accent-cyan);">${currentPlayer.password}</span></p>
                        <p style="font-size: 0.75rem; color: var(--accent-yellow); margin-top: 5px;">Save these to login!</p>
                    </div>
                    <button class="btn btn-success mt-4" onclick="navigate('login'); resetTestUI();">Go to Login</button>
                ` : `
                    <p style="font-size: 0.8rem; color: var(--text-secondary);">Retry after 24h</p>
                    <button class="btn btn-secondary mt-4" onclick="resetTestUI()">Home</button>
                `}
            `;
        }

        window.showReviewModal = function() {
            const container = document.getElementById('reviewContent');
            let html = '';
            
            questions.forEach((q, idx) => {
                const userAnsIdx = answers[idx];
                const correctOpt = q.shuffledOptions.find(o => o.isCorrect);
                const userOpt = q.shuffledOptions[userAnsIdx];
                const isCorrect = userOpt && userOpt.isCorrect;
                
                html += `
                    <div class="review-item ${isCorrect ? 'review-correct' : 'review-wrong'}">
                        <div style="margin-bottom: 5px;"><strong>Q${idx+1}:</strong> ${q.q} </div>
                        <div style="color: ${isCorrect ? 'var(--accent-green)' : 'var(--accent-red)'};">
                            Your Answer: ${userOpt ? userOpt.text : 'Not Answered'}
                        </div>
                        ${!isCorrect ? `<div style="color: var(--accent-green);">Correct Answer: ${correctOpt.text}</div>` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
            document.getElementById('reviewModal').classList.add('show');
        }

        window.resetTestUI = function() {
            currentPlayer = null; questions = []; currentQuestionIndex = 0; answers = {}; timeRemaining = 900;
            document.getElementById('registrationCard').style.display = 'block';
            document.getElementById('testCard').style.display = 'none';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('registrationForm').reset();
            navigate('home');
        }

        // ---------------------------------------------------------
        // LOGIN LOGIC: UID + PASSWORD
        // ---------------------------------------------------------
        async function handleLogin(e) {
            e.preventDefault();
            const uidInput = document.getElementById('loginUID').value.trim();
            const pass = document.getElementById('loginPassword').value;
            
            // Query by UID
            const uidQuery = query(dbRef, orderByChild('uid'), equalTo(uidInput));
            const snapshot = await get(uidQuery);

            if (!snapshot.exists()) { showWarning('UID not found'); return; }
            
            // Get the first matching record
            const playerData = Object.values(snapshot.val())[0];

            if (playerData.password !== pass) { showWarning('Wrong password'); return; }
            if (playerData.status !== 'selected') { showWarning('Not selected yet'); return; }
            
            currentPlayer = playerData;
            showPlayerDashboard();
        }

        function showPlayerDashboard() {
            navigate('playerDashboard');
            document.getElementById('dashboardPlayerId').textContent = currentPlayer.uid;
            if (currentPlayer.stage >= 2) {
                document.getElementById('stage2Container').style.display = 'block';
                listenToPlayerChat();
                listenToPlayerSettings();
            } else { 
                document.getElementById('stage2Container').style.display = 'none'; 
                showWarning('Wait for Stage 2'); 
            }
        }

        function listenToPlayerChat() {
            // Need to find the specific player key for listening (if using push keys)
            // Since we queried by UID, we need the actual DB key if we didn't use UID as key.
            // For simplicity in chat, we will search the local cache or re-query.
            // Better approach: Save the firebase key during login.
            // Here we will find it from allPlayersData
            const playerKey = Object.keys(allPlayersData).find(key => allPlayersData[key].uid === currentPlayer.uid);
            
            const chatRef = ref(db, `players/${playerKey}/chat`);
            onValue(chatRef, (snapshot) => {
                const chat = snapshot.val();
                const container = document.getElementById('playerChatMessages');
                if (!chat) { container.innerHTML = '<div class="message received">Admin chat</div>'; return; }
                container.innerHTML = Object.values(chat).map(m => `<div class="message ${m.from === 'player' ? 'sent' : 'received'}">${m.text}</div>`).join('');
                container.scrollTop = container.scrollHeight;
            });
        }

        function listenToPlayerSettings() {
            const playerKey = Object.keys(allPlayersData).find(key => allPlayersData[key].uid === currentPlayer.uid);
            onValue(ref(db, `players/${playerKey}`), (snapshot) => {
                const p = snapshot.val();
                const c = document.getElementById('playerSettingsDisplay');
                c.innerHTML = p.sensi ? `<div class="settings-item"><span>Gen</span><span>${p.sensi.general}</span></div><div class="settings-item"><span>RedDot</span><span>${p.sensi.redDot}</span></div>` : 'Wait for admin.';
            });
        }

        window.sendPlayerMessage = async function() {
            const input = document.getElementById('playerChatInput');
            if (!input.value.trim()) return;
            const playerKey = Object.keys(allPlayersData).find(key => allPlayersData[key].uid === currentPlayer.uid);
            await push(ref(db, `players/${playerKey}/chat`), { from: 'player', text: input.value.trim(), time: Date.now() });
            input.value = '';
        }
        
        window.playerLogout = function() { currentPlayer = null; navigate('home'); }

        // Admin Logic
        function handleAdminLogin(e) {
            e.preventDefault();
            if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                adminLoggedIn = true;
                document.getElementById('adminLoginCard').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                listenToPlayersTable();
            } else showWarning('Wrong pass');
        }

        function listenToPlayersTable() {
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                allPlayersData = data || {};
                renderPlayersMobile(Object.entries(allPlayersData));
            });
        }

        function renderPlayersMobile(playerEntries) {
            const container = document.getElementById('playersTableBody');
            if (playerEntries.length === 0) { container.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">Empty</p>'; return; }
            
            container.innerHTML = playerEntries.map(([key, p]) => `
                <div class="player-card-mobile">
                    <div class="row">
                        <span class="font-gaming" style="color:var(--accent-cyan);">${p.uid}</span>
                        <span class="status status-${p.status}">${p.status}</span>
                    </div>
                    <div class="row">
                        <span>${p.name}</span>
                        <span>${p.score}%</span>
                    </div>
                    <div class="row">
                        <span style="color:var(--text-secondary);">Role: ${p.suggestedRole || '-'}</span>
                        <span style="color:var(--accent-purple);">Lvl ${p.level}</span>
                    </div>
                    <div class="actions">
                        ${p.status === 'pending' ? 
                            `<button class="btn btn-success" style="padding: 5px;" onclick="approvePlayer('${key}')">Approve</button>
                             <button class="btn btn-danger" style="padding: 5px;" onclick="rejectPlayer('${key}')">Reject</button>` : 
                             `<button class="btn btn-purple" style="padding: 5px; grid-column: span 2;" onclick="openAdminChat('${key}')">Chat</button>`
                        }
                    </div>
                </div>
            `).join('');
        }

        window.searchPlayers = function() {
            const q = document.getElementById('searchUID').value.toLowerCase();
            const filtered = Object.entries(allPlayersData).filter(([k, p]) => p.uid.includes(q) || p.name.toLowerCase().includes(q));
            renderPlayersMobile(filtered);
        }

        window.approvePlayer = async function(key) { await update(ref(db, 'players/' + key), { status: 'selected', stage: 2 }); }
        window.rejectPlayer = async function(key) { await update(ref(db, 'players/' + key), { status: 'rejected', stage: 0 }); }

        window.openAdminChat = function(key) {
            selectedChatPlayer = allPlayersData[key];
            selectedChatPlayer.key = key; // Store key for easy access
            document.getElementById('adminChatPanel').style.display = 'block';
            document.getElementById('chatPlayerName').textContent = selectedChatPlayer.name;
            onValue(ref(db, `players/${key}/chat`), (snap) => {
                const chat = snap.val();
                const c = document.getElementById('adminChatMessages');
                if(!chat) { c.innerHTML = ''; return; }
                c.innerHTML = Object.values(chat).map(m => `<div class="message ${m.from === 'admin' ? 'sent' : 'received'}">${m.text}</div>`).join('');
                c.scrollTop = c.scrollHeight;
            });
        }
        window.closeAdminChat = function() { document.getElementById('adminChatPanel').style.display = 'none'; }
        window.sendAdminMessage = async function() {
            const input = document.getElementById('adminChatInput');
            if(!input.value.trim()) return;
            await push(ref(db, `players/${selectedChatPlayer.key}/chat`), { from: 'admin', text: input.value.trim(), time: Date.now() });
            input.value = '';
        }
        window.sendSensi = async function() {
            const s = { general: 85, redDot: 75, scope2x: 60, scope4x: 45, sniper: 30 };
            await push(ref(db, `players/${selectedChatPlayer.key}/chat`), { from: 'admin', text: `Sensi: Gen ${s.general} | Red ${s.redDot}`, time: Date.now() });
            await update(ref(db, 'players/' + selectedChatPlayer.key), { sensi: s });
        }
        window.sendHUD = async function() {
            await push(ref(db, `players/${selectedChatPlayer.key}/chat`), { from: 'admin', text: 'HUD: Fire BR, Joystick TL', time: Date.now() });
        }
        window.adminLogout = function() { adminLoggedIn = false; document.getElementById('adminLoginCard').style.display = 'block'; document.getElementById('adminDashboard').style.display = 'none'; }

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
    </script>
</body>
</html>
